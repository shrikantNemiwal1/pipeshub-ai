name: unit-test

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'backend/nodejs/apps/src/**'
      - 'backend/nodejs/apps/tests/**'
      - 'backend/nodejs/apps/package.json'
      - 'backend/nodejs/apps/package-lock.json'
      - 'backend/nodejs/apps/tsconfig*.json'
      - 'backend/nodejs/apps/.mocharc.yaml'
      - 'backend/nodejs/apps/.c8rc.json'
      - 'backend/python/app/**'
      - 'backend/python/tests/**'
      - 'backend/python/pyproject.toml'
      - 'backend/python/pytest.ini'
      - 'backend/python/.coveragerc'

  workflow_call:
    inputs:
      python-coverage-threshold:
        description: 'Minimum Python coverage percentage'
        type: number
        default: 91.5
      generate-coverage-reports:
        description: 'Generate and upload coverage report artifacts'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  nodejs-unit-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/nodejs/apps/package-lock.json

      - name: Install dependencies
        run: |
          cd backend/nodejs/apps
          npm ci

      - name: Run unit tests with coverage
        run: |
          cd backend/nodejs/apps
          npx cross-env TS_NODE_PROJECT=tsconfig.test.json c8 --check-coverage --lines 90 --functions 90 --branches 80 --statements 90 --reporter=text --reporter=lcov mocha --parallel --jobs 4

      - name: Generate Node.js coverage reports
        if: ${{ always() && inputs.generate-coverage-reports == true }}
        run: |
          cd backend/nodejs/apps
          npx cross-env TS_NODE_PROJECT=tsconfig.test.json c8 report --reporter=html --reporter=json-summary

      - name: Zip coverage folder (Linux)
        if: ${{ always() && inputs.generate-coverage-reports == true && runner.os == 'Linux' }}
        working-directory: backend/nodejs/apps
        run: |
          if [ -d "coverage" ]; then
            zip -r coverage-report.zip coverage/
          fi

      - name: Zip coverage folder (Windows)
        if: ${{ always() && inputs.generate-coverage-reports == true && runner.os == 'Windows' }}
        working-directory: backend/nodejs/apps
        shell: pwsh
        run: |
          if (Test-Path coverage) {
            Compress-Archive -Path coverage -DestinationPath coverage-report.zip
          }

      - name: Upload Node.js coverage artifact
        if: ${{ always() && inputs.generate-coverage-reports == true }}
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-coverage-report-${{ matrix.os }}
          path: backend/nodejs/apps/coverage-report.zip
          retention-days: 7
          if-no-files-found: ignore

  python-unit-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmariadb-dev

      - name: Install MariaDB Connector/C (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mariadb-connector-c -y

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          cd backend/python
          uv pip install --system pytest pytest-asyncio pytest-timeout coverage
          uv pip install --system -e .

      - name: Run unit tests with coverage
        run: |
          cd backend/python
          coverage run -m pytest tests/unit -v
          coverage report --fail-under=${{ inputs.python-coverage-threshold || 91.5 }}

      - name: Generate coverage reports
        if: ${{ always() && inputs.generate-coverage-reports == true }}
        run: |
          cd backend/python
          coverage json -o coverage/coverage-summary.json
          coverage html -d coverage/htmlcov

      - name: Zip Python coverage folder (Linux)
        if: ${{ always() && inputs.generate-coverage-reports == true && runner.os == 'Linux' }}
        working-directory: backend/python
        run: |
          if [ -d "coverage" ]; then
            zip -r python-coverage-report.zip coverage/
          fi

      - name: Zip Python coverage folder (Windows)
        if: ${{ always() && inputs.generate-coverage-reports == true && runner.os == 'Windows' }}
        working-directory: backend/python
        shell: pwsh
        run: |
          if (Test-Path coverage) {
            Compress-Archive -Path coverage -DestinationPath python-coverage-report.zip
          }

      - name: Upload Python coverage artifact
        if: ${{ always() && inputs.generate-coverage-reports == true }}
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report-${{ matrix.os }}-${{ matrix.python-version }}
          path: backend/python/python-coverage-report.zip
          retention-days: 7
          if-no-files-found: ignore
