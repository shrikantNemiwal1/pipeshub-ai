{{- /* Validate required secrets before deployment */ -}}
{{- include "pipeshub-ai.validateRequiredSecrets" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pipeshub-ai.fullname" . }}
  labels:
    {{- include "pipeshub-ai.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "pipeshub-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pipeshub-ai.labels" . | nindent 8 }}
        app.kubernetes.io/component: main
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pipeshub-ai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "pipeshub-ai.image" (dict "image" .Values.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: main
              containerPort: 8091
              protocol: TCP
            - name: connector
              containerPort: 8088
              protocol: TCP
            - name: backend
              containerPort: 3001
              protocol: TCP
            - name: query
              containerPort: 8000
              protocol: TCP
            - name: indexing
              containerPort: 8081
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            # Core environment settings
            - name: PORT
              value: {{ .Values.config.backendPort | quote }}
            - name: NODEJS_PORT
              value: {{ .Values.config.backendPort | quote }}
            - name: NODE_ENV
              value: {{ .Values.config.nodeEnv | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: KV_STORE_TYPE
              value: {{ .Values.config.kvStoreType | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            
            # Security settings
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.secretName" . }}
                  key: secret-key
            
            # Public endpoints
            - name: CONNECTOR_PUBLIC_BACKEND
              value: {{ .Values.config.connectorPublicBackend | quote }}
            - name: FRONTEND_PUBLIC_URL
              value: {{ .Values.config.frontendPublicUrl | quote }}
            
            # Internal service URLs
            - name: QUERY_BACKEND
              value: "http://localhost:8000"
            - name: CONNECTOR_BACKEND
              value: "http://localhost:8088"
            - name: INDEXING_BACKEND
              value: "http://localhost:8091"
            
            {{- if .Values.etcd.enabled }}
            # ETCD config
            - name: ETCD_URL
              value: "http://{{ include "pipeshub-ai.fullname" . }}-etcd:2379"
            - name: ETCD_HOST
              value: "{{ include "pipeshub-ai.fullname" . }}-etcd"
            {{- end }}
            
            {{- if .Values.arango.enabled }}
            # ArangoDB config
            - name: ARANGO_URL
              value: "http://{{ include "pipeshub-ai.fullname" . }}-arango:8529"
            - name: ARANGO_DB_NAME
              value: "es"
            - name: ARANGO_USERNAME
              value: "root"
            - name: ARANGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.arangoSecretName" . }}
                  key: arango-password
            {{- end }}
            {{- if .Values.neo4j.enabled }}
            # Neo4j config (app uses Neo4j as graph DB when DATA_STORE=neo4j)
            - name: GRAPH_DB_TYPE
              value: "neo4j"
            - name: DATA_STORE
              value: "neo4j"
            - name: NEO4J_URI
              value: "bolt://{{ include "pipeshub-ai.fullname" . }}-neo4j:7687"
            - name: NEO4J_USERNAME
              value: {{ .Values.neo4j.auth.username | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.neo4jSecretName" . }}
                  key: neo4j-password
            - name: NEO4J_DATABASE
              value: {{ .Values.neo4j.auth.database | quote }}
            {{- end }}
            
            # Message broker config
            - name: MESSAGE_BROKER
              value: {{ .Values.messageBroker.type | default "kafka" | quote }}
            - name: REDIS_STREAMS_MAXLEN
              value: {{ .Values.messageBroker.redisStreamsMaxLen | default "10000" | quote }}

            # Kafka config
            - name: KAFKA_BROKERS
              value: "{{ include "pipeshub-ai.fullname" . }}-kafka:9092"
            
            # Redis config
            {{- if eq .Values.redis.architecture "standalone" }}
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-redis-master"
            - name: REDIS_PORT
              value: "6379"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.redisSecretName" . }}
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Release.Name }}-redis-master:6379"
            {{- else }}
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            {{- end }}
            {{- else }}
            {{- /* Replication+Sentinel: connect to node-0 (master) via headless DNS */}}
            - name: REDIS_HOST
              value: "{{ .Release.Name }}-redis-node-0.{{ .Release.Name }}-redis-headless"
            - name: REDIS_PORT
              value: "6379"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.redisSecretName" . }}
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Release.Name }}-redis-node-0.{{ .Release.Name }}-redis-headless:6379"
            {{- else }}
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-node-0.{{ .Release.Name }}-redis-headless:6379"
            {{- end }}
            {{- end }}
            
            # MongoDB config
            {{- if .Values.mongodb.auth.enabled }}
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.mongodbSecretName" . }}
                  key: mongodb-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.mongodbSecretName" . }}
                  key: mongodb-password
            - name: MONGO_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ .Release.Name }}-mongodb:27017/?authSource=admin"
            {{- else }}
            - name: MONGO_URI
              value: "mongodb://{{ .Release.Name }}-mongodb:27017"
            {{- end }}
            - name: MONGO_DB_NAME
              value: "es"
            - name: REPLICA_SET_AVAILABLE
              value: {{ .Values.mongodb.replicaSetAvailable | toString | quote }}
            
            # Qdrant config
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pipeshub-ai.qdrantSecretName" . }}
                  key: qdrant-api-key
            - name: QDRANT_HOST
              value: "{{ include "pipeshub-ai.fullname" . }}-qdrant"
            - name: QDRANT_GRPC_PORT
              value: "6334"
            - name: QDRANT_PORT
              value: "6333"
            - name: HOME
              value: /home/user
            
            {{- if .Values.telemetry.enabled }}
            # OpenTelemetry configuration
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ required "telemetry.otlp.endpoint is required when telemetry.enabled is true" .Values.telemetry.otlp.endpoint | quote }}
            {{- if .Values.telemetry.otlp.tls.insecure }}
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "true"
            {{- end }}
            {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: pipeshub-storage
              mountPath: /data/pipeshub
              subPath: data
            - name: pipeshub-storage
              mountPath: /root/.local
              subPath: root-local
            - name: pipeshub-storage
              mountPath: /app/python/logs
              subPath: logs
            - name: pipeshub-storage
              mountPath: /home/user
              subPath: home
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.healthCheck.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.healthCheck.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.startupProbe.failureThreshold }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: backend
            initialDelaySeconds: {{ .Values.healthCheck.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.livenessProbe.failureThreshold }}
          {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: cache
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: pipeshub-storage
          persistentVolumeClaim:
            claimName: {{ include "pipeshub-ai.fullname" . }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
